name: Build Foolscap (Windows)

on:
  workflow_dispatch: {}
  push:
    branches: ["claude/epic-archimedes-j9876k"]
    paths-ignore: ["**.md"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Clean Windows runner: no corporate AV, so Electron's binary downloads and
      # extracts normally. .npmrc still routes better-sqlite3 to its Electron prebuilt.
      - name: Install dependencies
        run: npm install

      - name: Build main/preload/renderer
        run: npm run build

      - name: Package Windows app (installer + portable + zip, unsigned)
        run: npx electron-builder --win --publish never

      - name: Show build output
        run: dir release
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Foolscap-Windows
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

      # Publish the installers to the PUBLIC downloads repo so the source repo
      # can be private while download links stay public. Needs a repo secret
      # RELEASES_TOKEN (a fine-grained PAT with Contents: read+write on
      # BradLeeDogg/Foolscap-Releases). If the secret is absent, this step is
      # skipped (continue-on-error) and the build still succeeds.
      - name: Publish to the public downloads repo
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          repository: BradLeeDogg/Foolscap-Releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: win-latest
          name: Foolscap — latest Windows build
          body: |
            Unsigned Windows build, made automatically on a clean Windows VM.
            Three ways to run it:

            - `Foolscap-<version>-setup.exe` — installer.
            - `Foolscap-<version>-portable.exe` — the whole program in one file; just run it (no install).
            - `Foolscap-<version>.zip` — unzip anywhere and run `Foolscap.exe`.

            Not code-signed, so Windows SmartScreen may warn — choose
            **More info → Run anyway**.
          files: |
            release/*.exe
            release/*.zip
