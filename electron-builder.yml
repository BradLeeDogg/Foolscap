appId: com.wprocessor.app
productName: WProcessor
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  # native module must live unpacked so its .node binary is loadable
  - "**/node_modules/better-sqlite3/**"
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  category: public.app-category.productivity
linux:
  target:
    - AppImage
  category: Office
